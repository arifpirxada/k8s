services:
  client:
    image: arifpirxada/k8s-client:1.0.0
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL}
    networks:
      - k8scomposenet

  server:
    image: arifpirxada/k8s-server:1.0.0
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLIENT_URL: ${CLIENT_URL}
      NODE_ENV: production
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - k8scomposenet

  mongodb:
    image: mongo:latest
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${DATABASE_NAME}
    volumes:
      - mongo-data:/data/db
    networks:
      - k8scomposenet

volumes:
  mongo-data:

networks:
  k8scomposenet: