apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-server
  template:
    metadata:
      labels:
        app: k8s-server
    spec:
      containers:
        - name: k8s-server
          image: arifpirxada/k8s-server:1.0.0
          ports:
            - containerPort: 3000

          env:
            - name: NODE_ENV
              value: production

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---

apiVersion: v1
kind: Service
metadata:
  name: k8s-server-service
spec:
  selector:
    app: k8s-server
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP